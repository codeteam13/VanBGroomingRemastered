<main class="container">

    <section id="contact">
        <h2>Request an Appointment</h2>
        <p>Fill out the form below and we will contact you to schedule.</p>

        <form id="appointment-form" action="#" method="post" onsubmit="return validateForm(event)">
            <label for="name">Your Name *:</label>
            <input type="text" id="name" name="name" placeholder="John Doe">

            <label for="email">Email Address *:</label>
            <input type="email" id="email" name="email" placeholder="john@example.com">

            <label for="phone">Phone Number *:</label>
            <input type="tel" id="phone" name="phone" placeholder="(207) 867-5309">

            <fieldset style="margin-top: 10px; border: 1px solid #ccc; padding: 10px; border-radius: 4px;">
                <legend style="font-weight: bold;">Pet Type *:</legend>
                <input type="radio" id="pet-dog" name="pet-type" value="dog" style="width: auto;">
                <label for="pet-dog" style="display: inline; font-weight: normal;">Dog</label>
                &nbsp;&nbsp;
                <input type="radio" id="pet-cat" name="pet-type" value="cat" style="width: auto;">
                <label for="pet-cat" style="display: inline; font-weight: normal;">Cat</label>
            </fieldset>

            <label for="service-type">Interested Service *:</label>
            <select id="service-type" name="service-type">
                <option value="">-- Please Select --</option>
                <option value="bath">Bath & Brush</option>
                <option value="spa">Full Spa</option>
                <option value="puppy">Puppy Trim</option>
            </select>

            <label for="instructions">Special Instructions (optional):</label>
            <textarea id="instructions" name="instructions" rows="4" placeholder="Any allergies, behaviors, etc."></textarea>

            <div style="margin-top: 15px;">
                <input type="checkbox" id="new-customer" name="new-customer" style="width: auto;">
                <label for="new-customer" style="display: inline; font-weight: normal;">I am a new customer</label>
            </div>

            <button type="submit">Contact</button>
            <p id="form-error" style="color: red; font-weight: bold; margin-top: 15px; line-height: 1.4;"></p>
        </form>
        <br>
        <p><strong>Or visit us at:</strong> 112 College Dr, Wells, ME 04090</p>

        <div class="responsive-map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d11613.433305606386!2d-70.60921417150124!3d43.306757816701264!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89e2a838bcb01df1%3A0xdb0def4c7c2e0e3a!2s112%20College%20Dr%2C%20Wells%2C%20ME%2004090!5e0!3m2!1sen!2sus!4v1761177709280!5m2!1sen!2sus" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
        </div>
    </section>
